info:
  name: Divide
  type: http
  seq: 2

http:
  method: GET
  url: "{{host}}/calculator?operation=divide&num1=10&num2=5"
  params:
    - name: operation
      value: divide
      type: query
    - name: num1
      value: "10"
      type: query
    - name: num2
      value: "5"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
